info:
  name: auth/demo-login
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/demo"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "testuser1@test.com"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        function onResponse(res) {
          if (res.getStatus() !== 200) {
            console.log("Demo login failed:", res.getStatus(), res.getBody());
            return;
          }

          const body = res.getBody();
          const accessToken = body?.data?.accessToken;

          if (!accessToken) {
            throw new Error("No data.accessToken in response");
          }

          // Runtime variable (good for tokens; survives the Bruno session)
          bru.setVar("token_user", accessToken);
          bru.setVar("token_admin", accessToken);

          // Optional: also set in the active environment
          // bru.setEnvVar("access_token", accessToken);
        }

        onResponse(res);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
